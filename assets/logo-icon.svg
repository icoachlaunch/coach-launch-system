<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Coach Launch icon">
  <!-- Icon mark: white U-with-upward-arrow on crimson circle (default for dark contexts) -->
  <circle cx="50" cy="50" r="50" fill="#db0063"/>
  <!-- U-shape -->
  <path d="M30 26 v26 a20 20 0 0 0 40 0 v-26" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  <!-- upward arrow rising out of the U -->
  <line x1="50" y1="66" x2="50" y2="24" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
  <path d="M38 36 L50 22 L62 36" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
